<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Secondary School Kanji 1001–1130</title>
<style>
  :root{
    --paper:#F3F2EC; --ink:#1C2230; --ink-soft:#5A6072;
    --indigo:#243B6B; --line:#DAD7CC; --card:#FFFFFF;
    --on:#2F6E73; --on-bg:#E4F0F0;
    --kun:#9A5A2B; --kun-bg:#F4E8DC;
    --sp:#6B4E8E; --sp-bg:#ECE6F2;
    --focus:#C6452E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    -webkit-text-size-adjust:100%;line-height:1.5;}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 56px;}
  header.top{position:sticky;top:0;z-index:10;background:var(--paper);
    padding:14px 14px 10px;margin:0 -14px;border-bottom:1px solid var(--line);}
  .title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  h1{font-size:19px;font-weight:700;margin:0;letter-spacing:.01em;}
  .count{font-size:13px;color:var(--ink-soft);}
  .controls{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
  .search{width:100%;font-size:16px;padding:11px 13px;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);}
  .search:focus{outline:2px solid var(--focus);outline-offset:1px;border-color:var(--focus);}
  .tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .tab{flex:0 0 auto;font-size:14px;font-weight:600;padding:8px 14px;border-radius:999px;
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
  .tab[aria-pressed="true"]{background:var(--indigo);color:#fff;border-color:var(--indigo);}
  .tab:focus-visible{outline:2px solid var(--focus);outline-offset:1px;}
  .grid{display:grid;gap:10px;margin-top:14px;grid-template-columns:1fr;}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;display:flex;gap:13px;align-items:flex-start;}
  .glyph{flex:0 0 auto;width:74px;height:74px;border-radius:11px;background:#FBFAF6;
    border:1px solid var(--line);padding:0;margin:0;cursor:pointer;position:relative;display:block;
    -webkit-tap-highlight-color:transparent;}
  .glyph:focus-visible{outline:2px solid var(--focus);outline-offset:2px;}
  .glyph svg{display:block;width:100%;height:100%;}
  .glyph .s{fill:none;stroke:var(--indigo);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round;}
  .glyph .sn{fill:#B0AEA4;font-size:7px;font-family:system-ui,sans-serif;}
  .glyph .hint{position:absolute;right:4px;bottom:2px;font-size:9px;font-weight:600;color:#BFBDB2;pointer-events:none;}
  .glyph.fallback{display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:42px;color:var(--indigo);}
  .info{flex:1 1 auto;min-width:0;}
  .meaning{font-size:16px;font-weight:700;margin:1px 0 4px;}
  .rgroup{display:flex;gap:8px;margin-top:9px;}
  .glabel{flex:0 0 auto;width:22px;height:22px;border-radius:6px;display:flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;}
  .glabel.on{background:var(--on-bg);color:var(--on);}
  .glabel.kun{background:var(--kun-bg);color:var(--kun);}
  .glabel.sp{background:var(--sp-bg);color:var(--sp);}
  .rlist{flex:1 1 auto;min-width:0;}
  .ritem{font-size:13px;margin:2px 0;line-height:1.45;word-break:break-word;color:var(--ink-soft);}
  .rd{font-weight:700;}
  .rd.on{color:var(--on);} .rd.kun{color:var(--kun);}
  .sep{color:#C2C0B6;margin:0 5px;}
  .ritem b{color:var(--ink);font-weight:600;}
  .sections{margin-top:4px;}
  .cat{display:flex;align-items:baseline;gap:8px;margin:22px 2px 0;
    font-size:15px;font-weight:700;color:var(--indigo);
    border-bottom:1px solid var(--line);padding-bottom:6px;}
  .cat .jp{font-weight:500;color:var(--ink-soft);font-size:13px;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;}
  .cat .cn{margin-left:auto;font-weight:500;color:var(--ink-soft);font-size:12px;}
  .empty{text-align:center;color:var(--ink-soft);padding:40px 0;font-size:15px;}
  footer{margin-top:22px;font-size:12px;color:var(--ink-soft);text-align:center;line-height:1.7;}
  .so-wrap{margin-top:11px;}
  .so-label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  .so-row{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;}
  .so-cell{flex:0 0 auto;width:44px;height:44px;border:1px solid var(--line);border-radius:7px;background:#FBFAF6;}
  .so-cell svg{display:block;width:100%;height:100%;}
  .so-g{stroke:#E4E1D7;stroke-width:1;stroke-dasharray:3 3;}
  .so-done{fill:none;stroke:#CBC8BE;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;}
  .so-cur{fill:none;stroke:var(--indigo);stroke-width:4.6;stroke-linecap:round;stroke-linejoin:round;}
  .so-dot{fill:var(--focus);}
</style>
</head>

const CATS = [{"k":"body","en":"Body & Health","jp":"体・健康","list":["窒","腺","痢","脊","哺","痘","頬","捻","臼"]},{"k":"emotion1","en":"Mind & Emotions ①","jp":"心・感情①","list":["謹","羞","惧","貪","遜","摯"]},{"k":"emotion2","en":"Mind & Emotions ②","jp":"心・感情②","list":["惰","憾","恣","憬","虞"]},{"k":"nature","en":"Nature & Plants","jp":"自然・植物","list":["虹","蛍","雌","霜","斑","礁","沃","繭"]},{"k":"water","en":"Water & Ships","jp":"水・船","list":["舶","舷","遡","濫","氾"]},{"k":"quality1","en":"Quality & State ①","jp":"様子①","list":["寡","淑","庸","旺","勾","廉","凸","凹"]},{"k":"quality2","en":"Quality & State ②","jp":"様子②","list":["緻","漸","褐","辣","汎","諧","倹"]},{"k":"measure","en":"Numbers & Measures","jp":"数・単位","list":["桁","畝","壱","升","厘","丙","斤","弐"]},{"k":"crimelaw","en":"Crime, Law & Punishment","jp":"罪・法・罰","list":["糾","拷","嚇","罷","窃","賂","劾","錮","陪","遵"]},{"k":"gov","en":"Government & Rank","jp":"政治・位","list":["准","俸","賓","謁","朕","璽","頒","詔"]},{"k":"ceremony","en":"Rites & Notices","jp":"儀礼・通達","list":["殉","弔","訃","迭","逓","嘱"]},{"k":"society","en":"Society & Family","jp":"社会・家","list":["租","娯","禍","賦","嫡","姻","媛","酪","屯"]},{"k":"things","en":"Things & Objects","jp":"物・道具","list":["玩","栓","麺","串","箋","籠","硝"]},{"k":"material","en":"Materials & Craft","jp":"素材・工","list":["冶","紡","繕","搾","璃","坑","塑","抹"]},{"k":"action1","en":"Actions ①","jp":"動作①","list":["倣","抄","謄","矯","毀","剥","叱","捗","墾"]},{"k":"action2","en":"Actions ②","jp":"動作②","list":["煎","堆","卸","耗","塡","斥","萎","款"]},{"k":"idea","en":"Abstract & Ideas","jp":"概念","list":["喩","韻","刹","采","冥","弧","彙","楷","衷"]}];

const REDUCE = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const MAP={}; DATA.forEach(d=>MAP[d.k]=d);
const grid=document.getElementById('grid');
const emptyEl=document.getElementById('empty');
const countEl=document.getElementById('count');
const searchEl=document.getElementById('search');
const tabsEl=document.getElementById('tabs');
let activeCat="", query="";
function exHTML(s){
  const i=s.indexOf("= ");
  if(i<0) return s;
  return "<b>"+s.slice(0,i)+"</b>"+s.slice(i);
}
function glyphSVG(k){
  const s=STROKES[k];
  if(!s||!s.p.length) return `<button class="glyph fallback" aria-label="${k}">${k}</button>`;
  const paths=s.p.map(d=>`<path class="s" d="${d}"/>`).join("");
  const nums=s.n.map((c,i)=>`<text class="sn" x="${c[0]}" y="${c[1]}">${i+1}</text>`).join("");
  return `<button class="glyph" aria-label="Play stroke order for ${k}" title="Tap to animate stroke order">`+
    `<svg viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg">${paths}${nums}</svg>`+
    `<span class="hint">${s.p.length}画</span></button>`;
}
function playStrokes(svg){
  if(REDUCE) return;
  const ps=[...svg.querySelectorAll('.s')];
  if(!ps.length) return;
  const lens=ps.map(p=>p.getTotalLength());
  ps.forEach((p,i)=>{p.style.transition='none';p.style.strokeDasharray=lens[i];p.style.strokeDashoffset=lens[i];});
  svg.getBoundingClientRect();
  let delay=0;
  ps.forEach((p,i)=>{
    const dur=Math.max(220, lens[i]*6);
    p.style.transition=`stroke-dashoffset ${dur}ms ${delay}ms ease`;
    p.style.strokeDashoffset=0;
    delay+=dur+70;
  });
}
function group(label,cls,items,withReading){
  if(!items||!items.length) return "";
  const rows=items.map(it=>{
    if(withReading) return `<div class="ritem"><span class="rd ${cls}">${it[0]}</span><span class="sep">·</span>${exHTML(it[1])}</div>`;
    return `<div class="ritem">${exHTML(it)}</div>`;
  }).join("");
  const titles={on:"onyomi",kun:"kunyomi",sp:"special reading"};
  return `<div class="rgroup"><span class="glabel ${cls}" title="${titles[cls]}">${label}</span><div class="rlist">${rows}</div></div>`;
}
function searchText(d){
  let t=d.k+d.m;
  d.on.forEach(x=>t+=x[0]+x[1]);
  d.kun.forEach(x=>t+=x[0]+x[1]);
  (d.sp||[]).forEach(x=>t+=x);
  return t.toLowerCase();
}
function soStart(d){
  const m=d.match(/M\s*(-?[\d.]+)[ ,]+(-?[\d.]+)/i);
  return m?[parseFloat(m[1]),parseFloat(m[2])]:null;
}
function strokeOrderHTML(k){
  const s=STROKES[k];
  if(!s||!s.p.length) return "";
  const guide='<line class="so-g" x1="54.5" y1="6" x2="54.5" y2="103"/><line class="so-g" x1="6" y1="54.5" x2="103" y2="54.5"/>';
  let cells="";
  for(let i=0;i<s.p.length;i++){
    let paths="";
    for(let j=0;j<=i;j++){
      paths+=`<path class="${j===i?'so-cur':'so-done'}" d="${s.p[j]}"/>`;
    }
    const sp=soStart(s.p[i]);
    const dot=sp?`<circle class="so-dot" cx="${sp[0]}" cy="${sp[1]}" r="6"/>`:"";
    cells+=`<div class="so-cell"><svg viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg">${guide}${paths}${dot}</svg></div>`;
  }
  return `<div class="so-wrap"><div class="so-label">Stroke order</div><div class="so-row">${cells}</div></div>`;
}
function cardHTML(d){
  return `<article class="card">${glyphSVG(d.k)}<div class="info">`+
    `<div class="meaning">${d.m}</div>`+
    group("音","on",d.on,true)+group("訓","kun",d.kun,true)+group("特","sp",d.sp,false)+
    strokeOrderHTML(d.k)+
    `</div></article>`;
}
function render(){
  const q=query.trim().toLowerCase();
  grid.innerHTML="";
  let total=0;
  CATS.forEach(cat=>{
    if(activeCat && activeCat!==cat.k) return;
    const cards=cat.list.map(ch=>MAP[ch]).filter(Boolean)
      .filter(d=>!q || searchText(d).includes(q));
    if(!cards.length) return;
    total+=cards.length;
    const sec=document.createElement('section');
    sec.innerHTML=`<h2 class="cat">${cat.en} <span class="jp">${cat.jp}</span><span class="cn">${cards.length}</span></h2>`+
      `<div class="grid">`+cards.map(cardHTML).join("")+`</div>`;
    grid.appendChild(sec);
  });
  emptyEl.hidden=total>0;
  countEl.textContent=total+" kanji";
}
function buildTabs(){
  const chips=[{k:"",label:"All"}].concat(CATS.map(c=>({k:c.k,label:c.en})));
  tabsEl.innerHTML=chips.map(c=>`<button class="tab" data-cat="${c.k}" aria-pressed="${c.k===activeCat}">${c.label}</button>`).join("");
}
tabsEl.addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b) return;
  activeCat=b.dataset.cat;
  [...tabsEl.children].forEach(x=>x.setAttribute('aria-pressed', x===b?'true':'false'));
  render();
});
searchEl.addEventListener('input',e=>{query=e.target.value;render();});
grid.addEventListener('click',e=>{
  const b=e.target.closest('.glyph'); if(!b) return;
  const svg=b.querySelector('svg'); if(svg) playStrokes(svg);
});
buildTabs();
render();
</script>
